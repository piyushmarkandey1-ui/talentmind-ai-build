  <!-- T Horizontal Bar -->
  <path d="M30 35 L70 35" 
        stroke="url(#neonGradient)" stroke-width="6" stroke-linecap="round" />
        
  <!-- T Vertical Stem -->
  <path d="M50 35 L50 72" 
        stroke="url(#neonGradient)" stroke-width="6" stroke-linecap="round" />
        
  <!-- Nodes -->
  <circle cx="30" cy="35" r="6" fill="url(#neonGradient)" />
  <circle cx="70" cy="35" r="6" fill="url(#neonGradient)" />
  <circle cx="50" cy="72" r="6" fill="url(#neonGradient)" />
